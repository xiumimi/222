name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Locate Android project
        id: locate
        shell: bash
        run: |
          PROJECT_DIR="$(find . -maxdepth 3 -name settings.gradle -print -quit | xargs dirname)"
          if [ -z "$PROJECT_DIR" ]; then
            echo "Cannot find settings.gradle"
            find . -maxdepth 4 -type f
            exit 1
          fi
          echo "dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"
          echo "Found Android project at $PROJECT_DIR"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        run: gradle -p "${{ steps.locate.outputs.dir }}" assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: weibo-chaohua-viewer-debug-apk
          path: ${{ steps.locate.outputs.dir }}/app/build/outputs/apk/debug/app-debug.apk
